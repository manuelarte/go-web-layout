---
name: PR checks
on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read
  # Optional: allow read access to pull request. Use with `only-new-issues` option.
  # pull-requests: read

jobs:
  # Check if there is any dirty change for go mod tidy
  go-mod:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Check go mod
        run: |
          go mod tidy
          git diff --exit-code go.mod
          git diff --exit-code go.sum
  keep-sorted:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Run keep-sorted
        run: |
          go install github.com/google/keep-sorted@v0.7.1
          keep-sorted .golangci.yml ./resources/openapi.yml
          git diff --exit-code
  golangci:
    name: lint
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        go: [stable]
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11
  hadolint:
    name: hadolint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Dockerfile lint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
  spectral:
    name: Run Spectral
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: stoplightio/spectral-action@latest
        with:
          file_glob: './resources/openapi.yml'
  prose:
    name: vale/codespell/typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: errata-ai/vale-action@v2.1.1
        with:
          vale_flags: "--glob '*.{md,rst}' --glob '!styles/*'"
      - uses: codespell-project/actions-codespell@v2
        with:
          check_filenames: true
          check_hidden: true
      - name: Check spelling of entire workspace
        uses: crate-ci/typos@v1
  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: '**/*.md'
  yamllint:
    name: 'yamllint'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: karancode/yamllint-github-action@master
        with:
          yamllint_comment: true
        env:
          GITHUB_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  schemathesis:
    name: schemathesis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Build the app
        run: |
          go build -o go-web-layout ./cmd/go-web-layout
      - name: Start the app
        run: |
          ./go-web-layout &
          echo $! > /tmp/app.pid
          sleep 2
      - name: Wait for app to be healthy
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:3001/api/docs > /dev/null 2>&1; then
              echo "App is healthy"
              exit 0
            fi
            echo "Waiting for app to be ready... ($i/30)"
            sleep 1
          done
          echo "App failed to start"
          exit 1
      - uses: schemathesis/action@v3
        with:
          schema: "http://localhost:3001/api/docs"
          checks: "not (unsupported_http_method)"
      - name: Stop the app
        if: always()
        run: |
          kill $(cat /tmp/app.pid) || true
          wait $(cat /tmp/app.pid) 2>/dev/null || true
